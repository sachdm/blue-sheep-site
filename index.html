<script>
  // Hero headline replays its animation every time it scrolls back into view
  const heroRevealEls = document.querySelectorAll('.hero-content .reveal');
  const heroRevealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      entry.target.classList.toggle('in-view', entry.isIntersecting);
    });
  }, { threshold: 0.15 });
  heroRevealEls.forEach(el => heroRevealObserver.observe(el));

  // Hero subtext plays coy: everything after "Blue Sheep" sits as scrambled
  // letters until you hover (or focus) the name, then each word resolves
  // into place one at a time — same scramble language as the work page.
  (function() {
    var trigger = document.getElementById('heroSubTrigger');
    var words = Array.from(document.querySelectorAll('.scramble-words .w'));
    if (!trigger || !words.length) return;
    var prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var SCRAMBLE_CHARS = 'abcdefghijklmnopqrstuvwxyz';

    words.forEach(function(el) { el.dataset.original = el.textContent; });

    function randomGibberish(text) {
      return text.split('').map(function(ch) {
        return /[a-z]/i.test(ch) ? SCRAMBLE_CHARS[(Math.random() * SCRAMBLE_CHARS.length) | 0] : ch;
      }).join('');
    }

    function scrambleTo(el, toText) {
      if (prefersReducedMotion) { el.textContent = toText; return; }
      if (el._raf) cancelAnimationFrame(el._raf);
      var cycle = 220;
      var start = performance.now();
      function step(now) {
        if (now - start < cycle) {
          el.textContent = randomGibberish(toText);
          el._raf = requestAnimationFrame(step);
        } else {
          el.textContent = toText;
          el._raf = null;
        }
      }
      el._raf = requestAnimationFrame(step);
    }

    if (!prefersReducedMotion) {
      words.forEach(function(el) { el.textContent = randomGibberish(el.dataset.original); });
    }

    var revealTimers = [];
    function clearTimers() { revealTimers.forEach(clearTimeout); revealTimers = []; }

    function revealAll() {
      if (prefersReducedMotion) return;
      clearTimers();
      words.forEach(function(el, i) {
        revealTimers.push(setTimeout(function() { scrambleTo(el, el.dataset.original); }, i * 70));
      });
    }

    function obscureAll() {
      if (prefersReducedMotion) return;
      clearTimers();
      words.forEach(function(el, i) {
        revealTimers.push(setTimeout(function() { scrambleTo(el, randomGibberish(el.dataset.original)); }, i * 40));
      });
    }

    trigger.addEventListener('mouseenter', revealAll);
    trigger.addEventListener('focus', revealAll);
    trigger.addEventListener('mouseleave', obscureAll);
    trigger.addEventListener('blur', obscureAll);
  })();

  (function() {
    var path = location.pathname.split('/').pop() || 'index.html';
    document.querySelectorAll('.nav-links a').forEach(function(a) {
      var raw = a.getAttribute('href') || '';
      if (raw.charAt(0) === '#') return;
      var href = raw.split('#')[0] || 'index.html';
      if (href === path) a.setAttribute('aria-current', 'page');
    });
  })();

  const toggle = document.querySelector('.nav-toggle');
  const linkGroup = document.querySelector('.nav-links');
  toggle.addEventListener('click', () => {
    const isOpen = linkGroup.classList.toggle('open');
    toggle.textContent = isOpen ? 'Close' : 'Menu';
    toggle.setAttribute('aria-expanded', String(isOpen));
    document.documentElement.style.overflow = isOpen ? 'hidden' : '';
    if (isOpen) {
      const firstLink = linkGroup.querySelector('a');
      if (firstLink) firstLink.focus();
    } else {
      toggle.focus();
    }
  });
  linkGroup.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && linkGroup.classList.contains('open')) {
      linkGroup.classList.remove('open');
      toggle.textContent = 'Menu';
      toggle.setAttribute('aria-expanded', 'false');
      document.documentElement.style.overflow = '';
      toggle.focus();
    }
  });

  const themeToggle = document.getElementById('themeToggle');
  if (themeToggle) {
    if (document.documentElement.getAttribute('data-theme') === 'light') {
      themeToggle.textContent = '☀';
    }
    themeToggle.addEventListener('click', () => {
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      const meta = document.querySelector('meta[name="theme-color"]');
      if (isLight) {
        document.documentElement.removeAttribute('data-theme');
        themeToggle.textContent = '☾';
        if (meta) meta.setAttribute('content', '#0a0a0a');
        try { localStorage.setItem('bs-theme', 'dark'); } catch (e) {}
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
        themeToggle.textContent = '☀';
        if (meta) meta.setAttribute('content', '#f4f2ec');
        try { localStorage.setItem('bs-theme', 'light'); } catch (e) {}
      }
    });
  }

  const progressBar = document.querySelector('.progress-bar');
  function updateProgress() {
    const h = document.documentElement;
    const scrollable = h.scrollHeight - h.clientHeight;
    const pct = scrollable > 0 ? (h.scrollTop / scrollable) * 100 : 0;
    progressBar.style.width = pct + '%';
  }
  window.addEventListener('scroll', updateProgress, { passive: true });
  updateProgress();

  const clockEl = document.getElementById('clock');
  if (clockEl) {
    const fmt = new Intl.DateTimeFormat('en-US', { timeZone: 'America/Toronto', hour: 'numeric', minute: '2-digit', hour12: true });
    function updateClock() {
      clockEl.textContent = 'Toronto — ' + fmt.format(new Date());
    }
    updateClock();
    setInterval(updateClock, 30000);
  }
</script>
