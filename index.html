<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOMAD — project</title>
<style>
  :root {
    --bg: #0c0f0d;
    --bg2: #10140f;
    --fg: #c8e6c9;
    --green: #4ade80;
    --dim: #5b7360;
    --amber: #fbbf24;
    --cyan: #67e8f9;
    --red: #f87171;
    --hover: #1a221c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: "SF Mono", "Menlo", "Monaco", "Fira Code", "Cascadia Code", monospace;
    font-size: 14px;
    line-height: 1.65;
  }
  body::after {
    content: "";
    position: fixed; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.10) 0px, rgba(0,0,0,0.10) 1px, transparent 1px, transparent 3px);
  }

  /* ---------- layout ---------- */
  #app { display: flex; height: 100vh; }
  #sidebar {
    width: 300px; min-width: 300px;
    background: var(--bg2);
    border-right: 1px solid #1e2a20;
    display: flex; flex-direction: column;
    overflow-y: auto;
  }
  #content {
    flex: 1; overflow-y: auto;
    padding: 28px 40px 30vh;
  }
  #reader { max-width: 740px; margin: 0 auto; }

  /* ---------- sidebar ---------- */
  #brand {
    padding: 16px 16px 12px;
    border-bottom: 1px solid #1e2a20;
  }
  #brand .prompt { color: var(--green); }
  #brand .at { color: var(--dim); }
  #brand .path { color: var(--cyan); }
  #cursor {
    display: inline-block; width: 8px; height: 15px;
    background: var(--green); vertical-align: text-bottom;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  #brand .sub { color: var(--dim); font-size: 12px; margin-top: 2px; }

  #searchwrap { padding: 10px 16px; border-bottom: 1px solid #1e2a20; }
  #search {
    width: 100%;
    background: var(--bg);
    border: 1px solid #223026;
    border-radius: 4px;
    color: var(--fg);
    font: inherit;
    padding: 6px 9px;
    outline: none;
  }
  #search:focus { border-color: var(--green); }
  #search::placeholder { color: var(--dim); }

  #nav { flex: 1; padding: 8px 0 24px; }
  .group-label {
    padding: 14px 16px 4px;
    color: var(--amber);
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .group-label .count { color: var(--dim); letter-spacing: 0; }
  .nav-item {
    display: block;
    padding: 6px 16px 6px 22px;
    cursor: pointer;
    border-left: 2px solid transparent;
    color: var(--fg);
    text-decoration: none;
  }
  .nav-item:hover { background: var(--hover); }
  .nav-item.active { background: var(--hover); border-left-color: var(--green); }
  .nav-item .t { display: block; }
  .nav-item .d { display: block; color: var(--dim); font-size: 11px; }
  #empty-note { padding: 12px 16px; color: var(--dim); font-size: 12px; }

  #sidebar-foot {
    padding: 12px 16px;
    border-top: 1px solid #1e2a20;
    color: var(--dim); font-size: 11px;
  }
  #sidebar-foot a { color: var(--cyan); text-decoration: none; }
  #sidebar-foot a:hover { text-decoration: underline; }

  /* ---------- reader ---------- */
  #meta {
    color: var(--dim); font-size: 12px;
    display: flex; gap: 14px; align-items: center;
    margin-bottom: 18px; flex-wrap: wrap;
  }
  #meta .tag { color: var(--amber); }
  #meta a { color: var(--cyan); text-decoration: none; }
  #meta a:hover { text-decoration: underline; }
  #prevnext { display: flex; justify-content: space-between; margin-top: 40px; color: var(--dim); font-size: 13px; }
  #prevnext span { cursor: pointer; color: var(--cyan); }
  #prevnext span:hover { text-decoration: underline; }

  .entry h1 { color: var(--green); font-size: 19px; margin: 4px 0 16px; }
  .entry h2 { color: var(--amber); font-size: 15px; margin: 26px 0 8px; }
  .entry h3 { color: var(--amber); font-size: 14px; margin: 18px 0 4px; }
  .entry p { margin: 10px 0; }
  .entry ul { list-style: none; margin: 8px 0; }
  .entry ul li { margin: 4px 0; }
  .entry ul li::before { content: "* "; color: var(--green); }
  .entry blockquote { color: var(--dim); border-left: 2px solid var(--dim); padding-left: 12px; margin: 10px 0; font-style: italic; }
  .entry code { background: var(--hover); color: var(--cyan); padding: 0 4px; border-radius: 3px; }
  .entry strong { color: #fff; }
  .entry em { color: var(--amber); }
  .entry hr { border: none; border-top: 1px dashed var(--dim); margin: 22px 0; }
  .entry a { color: var(--cyan); }
  .entry del { color: var(--dim); }

  /* screenplay rendering — Celtx-style */
  .entry.script { max-width: 620px; font-family: "Courier Prime", "Courier New", Courier, monospace; }
  .entry.script p { margin: 12px 0; }
  h2.slug {
    font-family: "Courier Prime", "Courier New", Courier, monospace;
    text-transform: uppercase;
    color: #fff !important;
    font-size: 14px !important;
    font-weight: bold;
    letter-spacing: .5px;
    margin: 30px 0 12px !important;
  }
  .dialog {
    font-family: "Courier Prime", "Courier New", Courier, monospace;
    max-width: 40ch;
    margin: 16px auto;
  }
  .dialog h3 {
    text-align: center;
    text-transform: uppercase;
    color: #fff !important;
    font-size: 14px !important;
    font-weight: normal;
    margin: 0 0 1px !important;
  }
  .dialog h3 em { color: var(--dim); text-transform: none; }
  .dialog p { margin: 0 0 2px !important; color: var(--fg); }
  .dialog p.paren {
    text-align: center;
    max-width: 30ch;
    margin: 0 auto 2px !important;
  }
  .dialog p.paren em { color: var(--dim); }
  .dialog blockquote { text-align: center; border: none; font-style: normal; color: var(--fg); padding: 0; }

  /* ---------- white screenplay page (master script) ---------- */
  /* no scanlines on the script page */
  #content.page-mode { background: #33352f; }
  #content.page-mode::before { display: none; }
  body:has(#content.page-mode)::after { display: none; }

  .page-wrap { position: relative; max-width: 1060px; margin: 0 auto; }
  .page {
    background: #fff; color: #111;
    font-family: "Courier Prime", "Courier New", Courier, monospace;
    font-size: 13.5px; line-height: 1.5;
    width: 640px; margin: 26px 0 26px 26px;
    padding: 76px 84px 92px;
    box-shadow: 0 6px 30px rgba(0,0,0,.5);
  }
  /* --- title page --- */
  .page .titlepage {
    min-height: 74vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; position: relative;
  }
  .page .titlepage .logo { width: 150px; height: auto; margin-bottom: 40px; }
  .page .titlepage .t { font-size: 22px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 34px; }
  .page .titlepage .by { margin: 3px 0; }
  .page .titlepage .contact { position: absolute; bottom: 0; right: 0; font-size: 12.5px; color: #222; text-align: right; }
  .page .titlepage + .sp-body { border-top: 1px dashed #ccc; padding-top: 44px; margin-top: 44px; }

  /* --- screenplay elements (professional indents, Courier) --- */
  .sp-slug   { text-transform: uppercase; font-weight: bold; margin: 26px 0 12px; }
  .sp-slug.first { margin-top: 0; }
  .sp-action { margin: 0 0 12px; }
  .sp-char   { text-transform: uppercase; margin: 12px 0 0; padding-left: 21ch; }
  .sp-paren  { margin: 0; padding-left: 15ch; max-width: 30ch; color: #222; }
  .sp-dialog { margin: 0; padding-left: 10ch; max-width: 45ch; }
  .sp-trans  { text-transform: uppercase; text-align: right; margin: 14px 0; }
  .sp-center { text-align: center; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; margin: 34px 0 18px; }
  .sp-super  { margin: 0 0 12px; }
  .noteref {
    display: inline-block; width: 15px; height: 15px; margin-left: 3px;
    background: #2f6df6; color: #fff; border-radius: 50%;
    font-size: 9px; line-height: 15px; text-align: center; vertical-align: super;
    font-family: monospace; cursor: default;
  }

  /* --- notes in the grey gutter, never on the paper --- */
  .notes-layer { position: absolute; top: 0; left: 776px; width: 236px; }
  .note-card {
    position: absolute; width: 236px;
    background: #23251f; color: #c8e6c9; border-left: 2px solid #2f6df6;
    font-family: "SF Mono","Menlo",monospace; font-size: 11px; line-height: 1.5;
    padding: 7px 10px; border-radius: 3px;
  }
  .note-card .n { color: #2f6df6; font-weight: bold; margin-right: 4px; }

  /* if the content pane is too narrow for a gutter, notes stack under the page */
  @media (max-width: 1120px) {
    .page-wrap { max-width: 692px; }
    .notes-layer { position: static; width: auto; margin: 4px 26px 40px; }
    .note-card { position: static !important; width: auto; margin: 6px 0; }
  }

  #welcome { color: var(--dim); margin-top: 10vh; text-align: center; }
  #welcome .big { color: var(--green); font-size: 18px; }

  kbd {
    background: var(--hover); border: 1px solid #2a3a2e; border-radius: 3px;
    padding: 0 5px; font: inherit; font-size: 11px; color: var(--fg);
  }

  /* ---------- mobile ---------- */
  @media (max-width: 760px) {
    #app { flex-direction: column; height: auto; }
    #sidebar { width: 100%; min-width: 0; max-height: 45vh; border-right: none; border-bottom: 1px solid #1e2a20; }
    #content { padding: 20px 16px 20vh; }
    .page { width: auto; max-width: 100%; margin: 12px 0; padding: 40px 26px 60px; }
    .page .sp-char { padding-left: 40%; }
    .page .sp-dialog { padding-left: 14%; }
    .page .sp-paren { padding-left: 28%; }
    /* notes fall inline as small cards under the page */
    .notes-layer { position: static; width: auto; margin-top: 16px; }
    .note-card { position: static !important; width: auto; margin: 6px 0; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="brand">
      <div><span class="prompt">lambo</span><span class="at">@</span><span class="path">nomad</span><span class="at">:~$</span> <span id="cursor"></span></div>
    </div>
    <div id="searchwrap">
      <input id="search" placeholder="filter... ( / )" autocomplete="off" spellcheck="false">
    </div>
    <div id="nav"></div>
    <div id="sidebar-foot">
      <div><kbd>j</kbd>/<kbd>k</kbd> next/prev · <kbd>/</kbd> search</div>
      <div style="margin-top:4px"><a id="new-entry-link" target="_blank" rel="noopener">+ new entry</a> · <a id="repo-link" target="_blank" rel="noopener">repo</a></div>
    </div>
  </div>
  <div id="content">
    <div id="reader">
      <div id="welcome">
        <div class="big">NOMAD</div>
        <div>select an entry — or press <kbd>j</kbd></div>
      </div>
    </div>
  </div>
</div>

<script>
const REPO = 'sachdm/nomad_v2';
const SCRIPT_FILE = 'script.md';   // rendered on a white screenplay page with a title page
const GROUP_ORDER = ['master', 'draft', 'dev', 'scene', 'log', 'journal', 'archive'];
const GROUP_NAMES = { master: 'master script', draft: 'reference drafts', dev: 'development', scene: 'scenes', log: 'session logs', journal: 'journal', archive: 'archive — notebook' };

let entries = [];
let current = -1;
const nav = document.getElementById('nav');
const reader = document.getElementById('reader');
const search = document.getElementById('search');

document.getElementById('repo-link').href = `https://github.com/${REPO}`;
document.getElementById('new-entry-link').href = `https://github.com/${REPO}/new/main/entries`;

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function md(src) {
  const lines = src.split('\n');
  let html = '', inList = false;
  const inline = t => esc(t)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/~~([^~]+)~~/g, '<del>$1</del>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  for (const raw of lines) {
    const l = raw.trimEnd();
    const li = l.match(/^[-*] (.*)/);
    if (li) { if (!inList) { html += '<ul>'; inList = true; } html += `<li>${inline(li[1])}</li>`; continue; }
    if (inList) { html += '</ul>'; inList = false; }
    if (/^---+$/.test(l)) { html += '<hr>'; continue; }
    const h = l.match(/^(#{1,3}) (.*)/);
    if (h) { html += `<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`; continue; }
    if (l.startsWith('> ')) { html += `<blockquote>${inline(l.slice(2))}</blockquote>`; continue; }
    if (l === '') continue;
    html += `<p>${inline(l)}</p>`;
  }
  if (inList) html += '</ul>';
  return html;
}

function slugOf(e) { return e.file.replace(/\.md$/, ''); }

// ---- professional screenplay renderer (for the master script page) ----
// Parses the raw markdown into properly-indented screenplay elements,
// pulling [[ notes ]] out into the grey gutter.
function renderScreenplay(src) {
  const notes = [];
  let noteId = 0;
  // extract [[ note ]] markers -> replace with a numbered ref span, collect text
  const pullNotes = s => s.replace(/\[\[\s*([^\]]+?)\s*\]\]/g, (_, t) => {
    noteId++;
    notes.push({ id: noteId, text: t.trim() });
    return `<span class="noteref" data-note="${noteId}">${noteId}</span>`;
  });

  const rawLines = src.split('\n');
  // drop the title h1 and the render-note and leading rule
  const lines = [];
  for (const raw of rawLines) {
    const t = raw.trim();
    if (/^#\s+NOMAD/.test(t)) continue;
    if (/^\*\*Rendered/.test(t)) continue;
    lines.push(raw);
  }

  const isSlug = l => /^(?:##\s*)?(INT|EXT|INT\/EXT|EST)[.\s]/i.test(l.trim());
  const isTrans = l => /^(CUT TO:|CUT TO BLACK\.?|FADE (IN|OUT)|SMASH CUT|THE END)$/.test(l.trim());
  const isCue = l => {
    const t = l.trim();
    if (t.length === 0 || t.length > 38) return false;
    if (/^(INSERT|SUPER|INT|EXT)/i.test(t)) return false;
    // uppercase letters only (allow spaces, (), ', ., digits) and contain a letter
    return /[A-Z]/.test(t) && t === t.toUpperCase() && /^[A-Z0-9 '().\-/&]+$/.test(t);
  };

  let html = '', firstSlug = true, i = 0;
  const esc2 = s => esc(s);
  while (i < lines.length) {
    let l = lines[i].trim();
    if (l === '' || /^---+$/.test(l)) { i++; continue; }

    // section header (## that isn't a slug) -> centered
    const hh = l.match(/^##\s+(.*)/);
    if (hh && !isSlug(l)) { html += `<div class="sp-center">${pullNotes(esc2(hh[1]))}</div>`; i++; continue; }

    if (isSlug(l)) {
      const txt = l.replace(/^##\s*/, '');
      html += `<div class="sp-slug${firstSlug ? ' first' : ''}">${pullNotes(esc2(txt))}</div>`;
      firstSlug = false; i++; continue;
    }
    if (isTrans(l)) { html += `<div class="sp-trans">${esc2(l)}</div>`; i++; continue; }
    if (/^SUPER:/i.test(l)) { html += `<div class="sp-super">${pullNotes(esc2(l))}</div>`; i++; continue; }

    // character cue + dialogue block
    if (isCue(l)) {
      html += `<div class="sp-char">${esc2(l)}</div>`;
      i++;
      while (i < lines.length && lines[i].trim() !== '') {
        const d = lines[i].trim();
        if (/^\(.*\)$/.test(d)) html += `<div class="sp-paren">${pullNotes(esc2(d))}</div>`;
        else html += `<div class="sp-dialog">${pullNotes(esc2(d))}</div>`;
        i++;
      }
      continue;
    }

    // default: action
    html += `<div class="sp-action">${pullNotes(esc2(l))}</div>`;
    i++;
  }
  return { html, notes };
}

// place note cards in the grey gutter, vertically aligned to their refs
function layoutNotes(wrap, notes) {
  const layer = wrap.querySelector('.notes-layer');
  if (!layer) return;
  const wrapTop = wrap.getBoundingClientRect().top;
  let lastBottom = -100;
  wrap.querySelectorAll('.noteref').forEach(ref => {
    const id = ref.dataset.note;
    const note = notes.find(n => String(n.id) === id);
    if (!note) return;
    const card = document.createElement('div');
    card.className = 'note-card';
    card.innerHTML = `<span class="n">${id}</span>${esc(note.text)}`;
    layer.appendChild(card);
    let top = ref.getBoundingClientRect().top - wrapTop;
    if (top < lastBottom + 8) top = lastBottom + 8;  // avoid overlap
    card.style.top = top + 'px';
    lastBottom = top + card.offsetHeight;
  });
}

// Celtx-style screenplay transform: slugline h2s + character-cue h3 dialogue blocks
function screenplayify(container) {
  if (!container) return;
  container.querySelectorAll('h2').forEach(h => {
    if (/^(INT|EXT|INT\/EXT)[.\s]/i.test(h.textContent.trim())) h.classList.add('slug');
  });
  container.querySelectorAll('h3').forEach(h => {
    const block = [];
    let n = h.nextElementSibling;
    while (n && (n.tagName === 'P' || n.tagName === 'BLOCKQUOTE')) { block.push(n); n = n.nextElementSibling; }
    if (!block.length) return;
    const div = document.createElement('div');
    div.className = 'dialog';
    h.parentNode.insertBefore(div, h);
    div.appendChild(h);
    for (const el of block) {
      if (el.tagName === 'P' && /^<em>[^<]*<\/em>$/.test(el.innerHTML.trim())) el.classList.add('paren');
      div.appendChild(el);
    }
  });
}

function buildSidebar(filter = '') {
  const q = filter.toLowerCase();
  nav.innerHTML = '';
  let shown = 0;
  for (const cat of GROUP_ORDER) {
    const group = entries.filter(e => (e.category || 'journal') === cat)
      .filter(e => !q || e.title.toLowerCase().includes(q) || e.date.includes(q) || slugOf(e).includes(q));
    if (!group.length) continue;
    const label = document.createElement('div');
    label.className = 'group-label';
    label.innerHTML = `${GROUP_NAMES[cat] || cat} <span class="count">(${group.length})</span>`;
    nav.appendChild(label);
    for (const e of group) {
      const idx = entries.indexOf(e);
      const a = document.createElement('a');
      a.className = 'nav-item' + (idx === current ? ' active' : '');
      a.href = '#' + slugOf(e);
      a.dataset.idx = idx;
      a.innerHTML = `<span class="t">${esc(e.title)}</span><span class="d">${e.date}</span>`;
      nav.appendChild(a);
      shown++;
    }
  }
  if (!shown) nav.innerHTML = '<div id="empty-note">no matches</div>';
}

async function open(idx, push = true) {
  const e = entries[idx];
  if (!e) return;
  current = idx;
  buildSidebar(search.value);
  if (push) history.replaceState(null, '', '#' + slugOf(e));
  reader.innerHTML = '<div style="color:var(--dim)">loading…</div>';
  document.getElementById('content').classList.remove('page-mode');
  if (e.file.endsWith('.svg')) {
    reader.innerHTML = `
      <div id="meta">
        <span>${e.date}</span>
        <span class="tag">[${esc(e.category || 'map')}]</span>
        <a href="entries/${e.file}" target="_blank" rel="noopener">open full size</a>
      </div>
      <img src="entries/${e.file}" alt="${esc(e.title)}" style="width:100%;border:1px solid #1e2a20;border-radius:6px;background:var(--bg)">`;
    document.getElementById('content').scrollTop = 0;
    return;
  }
  const contentEl = document.getElementById('content');
  try {
    const res = await fetch('entries/' + e.file);
    if (!res.ok) throw new Error(res.status);
    const text = await res.text();
    const cat = e.category || 'journal';
    const editUrl = `https://github.com/${REPO}/edit/main/entries/${e.file}`;

    // --- the rendered master script: white professional screenplay page + gutter notes ---
    if (e.file === SCRIPT_FILE) {
      contentEl.classList.add('page-mode');
      const { html, notes } = renderScreenplay(text);
      reader.innerHTML = `
        <div class="page-wrap">
          <div class="page">
            <div class="titlepage">
              <img class="logo" src="logo.png" alt="Blue Sheep Films">
              <div class="t">NOMAD</div>
              <div class="by">written by</div>
              <div class="by">Lambo</div>
              <div class="contact">Blue Sheep Films<br>sacha@bluesheepfilms.com</div>
            </div>
            <div class="sp-body">${html}</div>
          </div>
          <div class="notes-layer"></div>
        </div>`;
      contentEl.scrollTop = 0;
      // place gutter notes after layout settles
      requestAnimationFrame(() => layoutNotes(reader.querySelector('.page-wrap'), notes));
      return;
    }

    contentEl.classList.remove('page-mode');
    reader.innerHTML = `
      <div id="meta">
        <span>${e.date}</span>
        <span class="tag">[${esc(cat)}]</span>
        <a href="${editUrl}" target="_blank" rel="noopener">edit ✎</a>
        <a href="entries/${e.file}" target="_blank" rel="noopener">raw</a>
      </div>
      <div class="entry${cat === 'scene' || cat === 'script' ? ' script' : ''}">${md(text)}</div>
      <div id="prevnext">
        <span id="pn-prev">${entries[idx-1] ? '← ' + esc(entries[idx-1].title) : ''}</span>
        <span id="pn-next">${entries[idx+1] ? esc(entries[idx+1].title) + ' →' : ''}</span>
      </div>`;
    screenplayify(reader.querySelector('.entry'));
    document.getElementById('content').scrollTop = 0;
    const prev = document.getElementById('pn-prev'), next = document.getElementById('pn-next');
    if (prev) prev.onclick = () => open(idx - 1);
    if (next) next.onclick = () => open(idx + 1);
  } catch {
    reader.innerHTML = `<div style="color:var(--red)">error reading entries/${esc(e.file)}</div>`;
  }
}

document.addEventListener('keydown', ev => {
  if (ev.target === search) {
    if (ev.key === 'Escape') search.blur();
    return;
  }
  if (ev.key === '/') { ev.preventDefault(); search.focus(); search.select(); }
  else if (ev.key === 'j' || ev.key === 'ArrowDown') { ev.preventDefault(); open(Math.min(current + 1, entries.length - 1)); }
  else if (ev.key === 'k' || ev.key === 'ArrowUp') { ev.preventDefault(); open(Math.max(current - 1, 0)); }
});

search.addEventListener('input', () => buildSidebar(search.value));

nav.addEventListener('click', ev => {
  const item = ev.target.closest('.nav-item');
  if (!item) return;
  ev.preventDefault();
  open(parseInt(item.dataset.idx, 10));
});

(async function boot() {
  try {
    const res = await fetch('entries.json');
    const raw = await res.json();
    const sorted = [];
    for (const cat of GROUP_ORDER) {
      sorted.push(...raw.filter(e => (e.category || 'journal') === cat)
        .sort((a, b) => b.date.localeCompare(a.date)));
    }
    sorted.push(...raw.filter(e => !GROUP_ORDER.includes(e.category || 'journal')));
    entries = sorted;
    buildSidebar();
    const slug = decodeURIComponent(location.hash.slice(1));
    const idx = entries.findIndex(e => slugOf(e) === slug || e.date === slug);
    if (idx >= 0) open(idx, false);
    else if (entries.length) open(0, false);
  } catch {
    reader.innerHTML = `<div style="color:var(--red)">couldn't load entries.json — if opened as a local file, run:<br><span style="color:var(--dim)">python3 -m http.server</span></div>`;
  }
})();
</script>
</body>
</html>
